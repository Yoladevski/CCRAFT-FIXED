<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Your Email</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #0E0E0E;">
  <table role="presentation" style="width: 100%; border-collapse: collapse;">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" style="width: 100%; max-width: 600px; border-collapse: collapse; background-color: #1A1A1A; border: 1px solid #2E2E2E; border-radius: 8px;">
          <!-- Header -->
          <tr>
            <td align="center" style="padding: 40px 40px 20px 40px;">
              <img src="https://dsbcbakdjzuustgaowcx.supabase.co/storage/v1/object/public/LOGOOOO.PNG/logo.png" alt="CombatCraft Logo" style="height: 32px; width: auto; display: block;">
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding: 20px 40px 40px 40px;">
              <h1 style="margin: 0 0 20px 0; font-size: 24px; font-weight: 700; color: #E0E0E0; text-align: center;">Confirm Your Email</h1>

              <p style="margin: 0 0 20px 0; font-size: 16px; line-height: 24px; color: #A0A0A0;">Welcome to COMBATCRAFT! Click the button below to confirm your email address and start your journey.</p>

              <!-- Button -->
              <table role="presentation" style="width: 100%; border-collapse: collapse; margin: 30px 0;">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 14px 32px; background-color: #B11226; color: #FFFFFF; text-decoration: none; font-size: 16px; font-weight: 600; border-radius: 6px;">Confirm Email</a>
                  </td>
                </tr>
              </table>

              <p style="margin: 20px 0 0 0; font-size: 14px; line-height: 20px; color: #A0A0A0;">If you didn't create an account, you can safely ignore this email.</p>

              <!-- Footer -->
              <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #2E2E2E;">
                <p style="margin: 0; font-size: 12px; line-height: 18px; color: #666666; text-align: center;">© {{ .Year }} COMBATCRAFT. All rights reserved.</p>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
